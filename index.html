<script>
    // ======================= 完整词汇库（严格按照用户提供的60词顺序，例句已替换为真题） =======================
    const FULL_VOCAB = [

        { word: "solid", rare: "reliable", example: "farmer's markets are a solid choice.", trans: "农贸市场是可靠的选择。", pos: "adj" },
        { word: "power", rare: "to supply energy to", example: "the code that powers AI.", trans: "驱动人工智能的代码。", pos: "verb" },
        { word: "point", rare: "opinion", example: "Campbell's point is to wake up those responsible.", trans: "坎贝尔的观点是唤醒负责人。", pos: "noun" },

        { word: "around", rare: "existing", example: "MacBike has been around for 30 years.", trans: "MacBike已存在近30年。", pos: "adj" },

        { word: "develop", rare: "to create/invent", example: "He developed a greenhouse-like facility.", trans: "他开发了一个类似温室的设施。", pos: "verb" },
        { word: "clear", rare: "transparent", example: "a series of clear fiberglass tanks.", trans: "一系列透明的玻璃纤维罐。", pos: "adj" },
        { word: "global", rare: "overall", example: "a global reduction in error.", trans: "错误的全面减少。", pos: "adj" },
        { word: "put", rare: "to write", example: "put the heading 'Personal strengths.'", trans: "写上“个人优点”的标题。", pos: "verb" },
        { word: "course", rare: "race track", example: "should have finished the course earlier.", trans: "本应该早一点完成比赛。", pos: "noun" },
        { word: "draw", rare: "to attract", example: "artists continue to be drawn to this place.", trans: "艺术家继续被吸引到这个地方。", pos: "verb" },
        { word: "volume", rare: "book", example: "absorbed in a volume.", trans: "全神贯注地看书。", pos: "noun" },
        { word: "hit", rare: "to encounter (difficulty)", example: "You'll hit roadblocks.", trans: "你会遇到障碍。", pos: "verb" },
        { word: "late", rare: "deceased", example: "her late grandfather.", trans: "她已故的祖父。", pos: "adj" },
        { word: "sharp", rare: "insightful/deep", example: "a sharp book that draws readers in.", trans: "一本深刻的书。", pos: "adj" },
        { word: "quarter", rare: "living area", example: "farm animal quarters.", trans: "农场动物园舍。", pos: "noun" },
        { word: "shot", rare: "photograph", example: "landscape shots.", trans: "风景照片。", pos: "noun" },
        { word: "sweep", rare: "wide area or range", example: "The sweep of the land moves her.", trans: "土地的辽阔让她感动。", pos: "noun" },
        { word: "drive", rare: "to push forward", example: "It drives the evolution.", trans: "它推动进化。", pos: "verb" },
        { word: "run", rare: "to publish; to manage", example: "ran an article; runs the program.", trans: "刊登文章；负责项目。", pos: "verb" },
        { word: "stick", rare: "to put/place casually", example: "I stuck the chicken in the freezer.", trans: "我把鸡肉放进冰柜。", pos: "verb" },
        { word: "pick up", rare: "to increase (wind)", example: "The wind picked up.", trans: "风越刮越大。", pos: "verb" },
        { word: "produce", rare: "farm products", example: "blemished produce.", trans: "有瑕疵的农产品。", pos: "noun" },
        { word: "round", rare: "to complete (in a good way)", example: "rounding out a dinner.", trans: "为烤鸡晚餐锦上添花。", pos: "verb" },
        { word: "pilot", rare: "to steer; experimental", example: "pilots ferryboats; pilot period.", trans: "驾驶渡轮；试点期。", pos: "verb" },
        { word: "consume", rare: "to eat/drink a lot", example: "consuming three times the sugar.", trans: "摄入三倍的糖。", pos: "verb" },
        { word: "land", rare: "to succeed in doing (trick)", example: "landed the trick.", trans: "成功完成动作。", pos: "verb" },
        { word: "position", rare: "to place", example: "positioned to see flashes of genius.", trans: "随处看到天才的闪现。", pos: "verb" },
        { word: "voice", rare: "to express", example: "voice art.", trans: "表达艺术。", pos: "verb" },
        { word: "inform", rare: "to influence", example: "continues to inform contemporary design.", trans: "继续影响着当代设计。", pos: "verb" },
        { word: "counter", rare: "to oppose", example: "plans to counter this trend.", trans: "计划抵制这种趋势。", pos: "verb" },
        { word: "market", rare: "to promote", example: "nature as a brand to be marketed.", trans: "将自然作为品牌推销。", pos: "verb" },
        { word: "exposure", rare: "contact", example: "exposure to human facial expressions.", trans: "接触人类面部表情。", pos: "noun" },
        { word: "extra", rare: "especially", example: "makes it extra hard.", trans: "使得格外困难。", pos: "adv" },
        { word: "top", rare: "to exceed", example: "topped 31 million.", trans: "超过了3100万。", pos: "verb" },
        { word: "repeat", rare: "repeated section", example: "find the repeats in the music.", trans: "找到音乐中的重复片段。", pos: "noun" },
        { word: "address", rare: "to speak to; to solve", example: "addressed the ceremony; address problems.", trans: "致辞；解决问题。", pos: "verb" },
        { word: "house", rare: "to provide shelter", example: "feed and house the populations.", trans: "提供食物和住房。", pos: "verb" },
        { word: "flow", rare: "smooth continuity", example: "break the flow of sound.", trans: "打断声音的流畅。", pos: "noun" }
    ];

    function getWordObj(word) { return FULL_VOCAB.find(v => v.word === word); }
    function getWordPattern(word) {
        if (word.includes(' ')) {
            const parts = word.split(' ');
            const base = parts[0];
            return new RegExp(`\\b${base}(?:s|ed)?\\s+${parts[1]}\\b`, 'gi');
        }
        const irregular = { "draw": "draw|drew|drawn|drawing", "hit": "hit|hits|hitting", "run": "run|runs|ran|running", "stick": "stick|sticks|stuck|sticking", "drive": "drive|drives|drove|driven|driving", "land": "land|lands|landed|landing", "position": "position|positions|positioned|positioning", "voice": "voice|voices|voiced|voicing", "inform": "inform|informs|informed|informing", "counter": "counter|counters|countered|countering", "market": "market|markets|marketed|marketing", "top": "top|tops|topped|topping", "address": "address|addresses|addressed|addressing", "house": "house|houses|housed|housing", "promise": "promise|promises|promised|promising", "introduce": "introduce|introduces|introduced|introducing", "power": "power|powers|powered|powering", "skip": "skip|skips|skipped|skipping", "trap": "trap|traps|trapped|trapping", "treat": "treat|treats|treated|treating", "develop": "develop|develops|developed|developing", "put": "put|puts|putting", "cover": "cover|covers|covered|covering", "leaf": "leaf|leafs|leafed|leafing", "skirt": "skirt|skirts|skirted|skirting", "border": "border|borders|bordered|bordering", "pick up": "pick up|picks up|picked up|picking up" };
        if (irregular[word]) return new RegExp(`\\b(?:${irregular[word]})\\b`, 'gi');
        return new RegExp(`\\b(?:${word}|${word}s|${word}es|${word}ed|${word}ing)\\b`, 'gi');
    }
    function highlightWordInSentence(sentence, word) {
        const regex = getWordPattern(word);
        return sentence.replace(regex, match => `<span class="highlight-word">${match}</span>`);
    }
    function addChineseNotes(text) {
        const notes = { 'testimonies': 'testimonies<small class="small-note">(证词)</small>', 'testimony': 'testimony<small class="small-note">(证词)</small>', 'old will': 'will<small class="small-note">(遗嘱)</small>', 'mansion': 'mansion<small class="small-note">(庄园)</small>', 'patrolling': 'patrolling<small class="small-note">(巡逻)</small>', 'hypotheticals': 'hypotheticals<small class="small-note">(假设情境)</small>', 'Forensics': 'Forensics<small class="small-note">(法医学)</small>', 'alibi': 'alibi<small class="small-note">(不在场证明)</small>', 'ransom': 'ransom<small class="small-note">(赎金)</small>', "servants' room": "servants' quarter<small class='small-note'> </small>" };
        let result = text;
        for (let [key, val] of Object.entries(notes)) { const regex = new RegExp(`\\b${key}\\b(?!<small)`, 'gi'); result = result.replace(regex, val); }
        return result;
    }

    // ======================= 案件证词 =======================
    // CASE1 (20条)
    const testimoniesCase1 = [];
    const wordSeq1 = ["breakdown","subject","document","geography","skirt","border","power","condition","leaf","say","print","property","sensitive","chief","piece","promise","solid","point","introduce","call"];
    const testimonyMap1 = {
        breakdown: { speaker:"🗝️ Butler", text:"The notebook with the financial breakdown is mine; it just lists household expenses. I have nothing to hide.", textTrans:"那本有财务明细的笔记本是我的，只是列出了家庭开支。我没什么可隐瞒的。" },

            2: { 
                correct: { en: "The librarian stole the research. He 'piloted' the archive, 'landed' the vault opening, 'voiced' threats, 'countered' accusations with lies, and hid the stolen files.", zh: "图书管理员窃取了研究资料。他'领导'档案室，'成功完成'开锁，'表达'威胁，用谎言'抵制'指控，并藏匿被盗文件。" },
                wrong: { en: "Wrong. The librarian is the real culprit. He shut down cameras, used sedatives, his shoeprints matched, and he marketed the victim's research.", zh: "错误。图书管理员才是真正的罪犯。他关闭摄像头、使用镇静剂、鞋印吻合、并且推销受害者的研究。" }
            }
        };
        return reasons[caseId][isCorrect ? 'correct' : 'wrong'];
    }

    function showCaseIntro(caseId, callback) {
        const caseData = cases[caseId];
        const overlay = document.createElement('div');
        overlay.className = 'intro-overlay';
        overlay.innerHTML = `<div class="intro-card" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${caseData.bgImage}'); background-size: cover; background-position: center;"><h2>${caseData.title}</h2><p>${caseData.brief}</p><button class="enter-btn">🔍 ENTER THE SCENE</button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.enter-btn').onclick = () => { overlay.remove(); callback(); };
    }

    function renderCaseGame(caseId) {
        activeCaseId = caseId;
        currentCaseData = cases[caseId];
        currentQuestionIndex = 0;
        waitingForNext = false;
        userAnswers = new Array(currentCaseData.testimonies.length).fill(null);
        document.getElementById('lobbyArea').style.display = 'none';
        document.getElementById('activeGamePanel').style.display = 'block';
        showQuestion();
    }
    function showQuestion() {
        if (waitingForNext) return;
        const testimonies = currentCaseData.testimonies;
        if (currentQuestionIndex >= testimonies.length) { showAccusationButton(); return; }
        const item = testimonies[currentQuestionIndex];
        const wordData = item.wordObj;
        const correctMeaning = wordData.rare;
        const opts = getOptionsForWord(correctMeaning, wordData.pos);
        const highlightedSentence = highlightWordInSentence(item.text, wordData.word);
        const html = `<button class="back-btn" id="exitInterrogateBtn">← Case Files</button><div class="case-header"><h3>${currentCaseData.title}</h3><p>${currentCaseData.brief}</p></div><div class="testimony"><p><strong>👤 ${item.speaker}:</strong> "${highlightedSentence}"</p><p>❓ What does "<strong>${wordData.word}</strong>" mean here? (hidden meaning)</p></div><div id="optionsArea"></div><div id="feedbackArea" class="bilingual-feedback" style="display:none;"></div><div>🔍 Progress: ${currentQuestionIndex+1}/${testimonies.length}</div>`;
        const panel = document.getElementById('activeGamePanel');
        panel.innerHTML = html;
        const optsDiv = document.getElementById('optionsArea');
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => {
                if (waitingForNext) return;
                const isCorrect = (opt === correctMeaning);
                userAnswers[currentQuestionIndex] = isCorrect;
                if (isCorrect) { currentQuestionIndex++; showQuestion(); }
                else {
                    recordWrongWord(wordData);
                    waitingForNext = true;
                    const fbDiv = document.getElementById('feedbackArea');
                    fbDiv.style.display = 'block';
                    fbDiv.innerHTML = `<strong>❌ Incorrect</strong><br>🔍 Correct hidden meaning: <strong>${correctMeaning}</strong><br>📝 Sentence translation: ${item.textTrans}<br>💡 Real example: ${wordData.example}<br><button id="nextQBtn" class="next-btn">➡ Next testimony</button>`;
                    document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
                    document.getElementById('nextQBtn').onclick = () => { currentQuestionIndex++; waitingForNext = false; showQuestion(); };
                }
            };
            optsDiv.appendChild(btn);
        });
        document.getElementById('exitInterrogateBtn').onclick = () => exitToLobby();
    }
    function showAccusationButton() {
        const panel = document.getElementById('activeGamePanel');
        panel.innerHTML = `<div class="case-header"><h3>🔍 ACCUSATION PHASE</h3><p>All testimonies heard. Accuse the criminal!</p></div><button id="goToAccuseBtn" class="back-btn" style="background:#d49c5f;">⚖️ PROCEED TO ACCUSE</button><button id="exitToLobbyBtn" class="back-btn">🏠 Back to lobby</button>`;
        document.getElementById('goToAccuseBtn').onclick = () => showAccusation();
        document.getElementById('exitToLobbyBtn').onclick = () => exitToLobby();
    }
    function showAccusation() {
        const panel = document.getElementById('activeGamePanel');
        const correctSolution = currentCaseData.solution;
        const correctName = currentCaseData.solutionName;
        let suspectOptions = currentCaseData.id===0 ? [{value:"butler",label:"🗝️ Butler"},{value:"maid",label:"🌹 Maid"},{value:"secretary",label:"📜 Secretary"}] : (currentCaseData.id===1 ? [{value:"guestRed",label:"🎭 Guest in Red"},{value:"guestBlue",label:"🎭 Guest in Blue"},{value:"guestGold",label:"🎭 Guest in Gold"}] : [{value:"librarian",label:"📖 Librarian"},{value:"professor",label:"🎓 Professor"},{value:"scientist",label:"🔬 Scientist"}]);
        let cluesHtml = `<div class="clue-list-panel"><strong>📜 ALL CLUES / 所有线索:</strong><div>`;
        currentCaseData.testimonies.forEach((t,i)=>{
            const highlighted = highlightWordInSentence(t.text, t.wordObj.word);
            cluesHtml += `<div class="clue-item"><div class="clue-text"><span class="speaker-name">${t.speaker}:</span> ${highlighted}</div><button class="help-btn" data-idx="${i}">📖 中文</button><span id="ct_${i}"></span></div>`;
        });
        cluesHtml += `</div></div>`;
        panel.innerHTML = `<div class="case-header"><h3>⚖️ FINAL ACCUSATION</h3></div>${cluesHtml}<div id="accuseOptions"></div><div id="accuseFeedback"></div><button id="backLobbyFinal" class="back-btn">🏠 Back to lobby</button>`;
        for(let i=0;i<currentCaseData.testimonies.length;i++){ panel.querySelector(`.help-btn[data-idx="${i}"]`).onclick = ()=>{ document.getElementById(`ct_${i}`).innerText = currentCaseData.testimonies[i].textTrans; setTimeout(()=>document.getElementById(`ct_${i}`).innerText="",3500); }; }
        const accuseDiv = document.getElementById('accuseOptions');
        suspectOptions.forEach(s=>{
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = s.label;
            btn.onclick = () => {
                const isCorrect = (s.value === correctSolution);
                const reason = getAccusationReason(currentCaseData.id, isCorrect);
                const feedbackDiv = document.getElementById('accuseFeedback');
                if (isCorrect) {
                    feedbackDiv.innerHTML = `<div class="bilingual-feedback" style="background:#cbe6cf;"><strong>✅ Correct! ${correctName} is the criminal.</strong><br><div class="reason-text"><strong>🔍 REASON (English):</strong><br>${reason.en}</div><div class="reason-text"><strong>📖 推理理由 (中文):</strong><br>${reason.zh}</div></div>`;
                } else {
                    feedbackDiv.innerHTML = `<div class="bilingual-feedback" style="background:#ffe0e0;"><strong>❌ Wrong accusation! The real criminal is ${correctName}.</strong><br><div class="reason-text"><strong>🔍 EXPLANATION (English):</strong><br>${reason.en}</div><div class="reason-text"><strong>📖 解释 (中文):</strong><br>${reason.zh}</div><button id="retryCaseBtn" class="next-btn">🔄 Restart this case</button></div>`;
                    document.getElementById('retryCaseBtn').onclick = () => { caseCompleted[activeCaseId] = false; renderCaseGame(activeCaseId); };
                }
                // 无论对错，案件都标记为完成（指认即完成）
                caseCompleted[activeCaseId] = true;
                updateLobbyAndUnlock();
                document.querySelectorAll('#accuseOptions .quiz-option').forEach(b => b.disabled = true);
            };
            accuseDiv.appendChild(btn);
        });
        document.getElementById('backLobbyFinal').onclick = () => exitToLobby();
    }
    function exitToLobby() { document.getElementById('activeGamePanel').style.display = 'none'; document.getElementById('lobbyArea').style.display = 'block'; updateLobbyAndUnlock(); }

    function updateLobbyAndUnlock() {
        const lobbyDiv = document.getElementById('caseLobby');
        lobbyDiv.innerHTML = '';
        cases.forEach((c, idx) => {
            const completed = caseCompleted[idx];
            const card = document.createElement('div');
            card.className = `case-card ${completed ? 'completed' : ''}`;
            card.innerHTML = `<div class="badge">${completed ? '✅' : '🔎'}</div><h3>${c.title}</h3><p>${c.brief.substring(0, 55)}...</p><p style="font-size:1rem;">🔍 ${c.testimonies.length} clues</p>`;
            card.addEventListener('click', () => { if(completed) { alert("Case already solved. Great detective!"); return; } showCaseIntro(idx, () => renderCaseGame(idx)); });
            lobbyDiv.appendChild(card);
        });
        const doneCount = caseCompleted.filter(v=>v===true).length;
        document.getElementById('globalProgress').innerHTML = `<span style="background:#c2a15b; padding:6px 18px; border-radius:60px; color:white;">🏆 CASES SOLVED: ${doneCount}/3</span>`;
        const allDone = doneCount === 3;
        const finalZone = document.getElementById('finalTestZone');
        if (allDone) { if (!window.finalUnlocked) { window.finalUnlocked = true; renderFinalTest(); } } 
        else { finalZone.innerHTML = `<div class="final-locked"><strong>🔒 FINAL EXAMINATION LOCKED</strong><br>Solve all three cases first to unlock targeted review!</div>`; window.finalUnlocked = false; }
    }

    function renderFinalTest() {
        const fullOrder = FULL_VOCAB.map(v => v.word);
        let wrongList = Array.from(wrongWordsSet).map(w => getWordObj(w)).filter(v => v);
        wrongList.sort((a,b) => fullOrder.indexOf(a.word) - fullOrder.indexOf(b.word));
        const finalDiv = document.getElementById('finalTestZone');
        if(wrongList.length===0){ finalDiv.innerHTML = `<div class="final-unlocked" style="text-align:center;"><h2>🏆 PERFECT DETECTIVE!</h2><p>You mastered every hidden meaning. No extra review needed.</p></div>`; return; }
        finalDiv.innerHTML = `<div class="final-unlocked"><h2>📚 TARGETED REVIEW · Your Mistakes Only</h2><p>You got ${wrongList.length} word(s) wrong. Practice with real exam sentences.</p><div id="finalTestList"></div><button id="submitFinalAll" style="background:#c49a6c; padding:12px 28px; border-radius:60px; margin-top:20px;">📊 SUBMIT & SCORE</button><div id="finalResult"></div></div>`;
        const listDiv = document.getElementById('finalTestList');
        wrongList.forEach((item, idx) => {
            const opts = getOptionsForWord(item.rare, item.pos);
            const wrapper = document.createElement('div'); wrapper.className = 'test-item';
            wrapper.innerHTML = `<div><strong>${item.word}</strong> (${item.pos})</div><div style="background:#f1e7d9; padding:8px; border-radius:24px;">📖 ${item.example}</div><button class="help-btn" data-idx="${idx}">❓ Show translation</button><span id="trans_${idx}" style="margin-left:10px;"></span><div class="option-group" id="opts_${idx}"></div>`;
            listDiv.appendChild(wrapper);
            const optGroup = wrapper.querySelector(`#opts_${idx}`);
            opts.forEach(opt => { const label = document.createElement('label'); label.className = 'option-label'; label.innerHTML = `<input type="radio" name="q_${idx}" value="${opt.replace(/"/g, '&quot;')}"> ${opt}`; optGroup.appendChild(label); });
            wrapper.querySelector('.help-btn').onclick = () => { document.getElementById(`trans_${idx}`).innerText = `📖 Chinese: ${item.trans}`; setTimeout(()=>document.getElementById(`trans_${idx}`).innerText="",3000); };
        });
        document.getElementById('submitFinalAll').onclick = () => {
            let correct=0;
            wrongList.forEach((item,idx)=>{ const selected = document.querySelector(`input[name="q_${idx}"]:checked`); if(selected && selected.value === item.rare) correct++; });
            const percent = Math.round((correct/wrongList.length)*100);
            document.getElementById('finalResult').innerHTML = `<div style="background:#e9e0cf; border-radius:48px; padding:20px; margin-top:20px;"><h3>🎯 Review Score: ${correct} / ${wrongList.length} (${percent}%)</h3>${percent>=80 ? 'Great improvement!' : 'Review explanations and try again.'}</div>`;
        };
    }

    // 首页蒙层
    (function addSplashOverlay() {
        const overlayDiv = document.createElement('div');
        overlayDiv.className = 'intro-overlay';
        overlayDiv.innerHTML = `<div class="intro-card" style="background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);"><h2>🕵️ MYSTERY MANSION<br>Hidden Meaning Detective</h2><div class="designer" style="font-size:1.1rem;">Designed by Mandy</div><button class="enter-btn" id="closeSplashBtn">🔓 ENTER THE MANSION</button></div>`;
        document.body.appendChild(overlayDiv);
        document.getElementById('closeSplashBtn').onclick = () => overlayDiv.remove();
    })();

    updateLobbyAndUnlock();
    window.finalUnlocked = false;
    document.getElementById('finalTestZone').innerHTML = `<div class="final-locked"><strong>🔒 FINAL EXAMINATION LOCKED</strong><br>Solve all three cases first to unlock the targeted review test!</div>`;
</script>
</body>
</html>
